<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vekus Server PN Generator v2</title>
    <style>
        * { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { max-width: 1400px; margin: 0 auto; padding: 20px; background: #f0f2f5; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #1a73e8; text-align: center; margin-bottom: 6px; font-size: 24px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 24px; font-size: 14px; }
        .version-badge { display: inline-block; background: #e8f0fe; color: #1a73e8; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; vertical-align: middle; margin-left: 8px; }

        /* Таблица комплектующих */
        .config-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 14px; }
        .config-table th { background: #f8f9fa; padding: 10px 8px; text-align: left; font-weight: 600; color: #333; border-bottom: 2px solid #dee2e6; font-size: 13px; }
        .config-table td { padding: 6px 4px; border-bottom: 1px solid #eee; vertical-align: middle; }
        .config-table tr:hover { background: #f8f9fa; }
        .config-table select, .config-table input { padding: 8px 10px; border: 1.5px solid #ddd; border-radius: 6px; font-size: 13px; width: 100%; transition: border-color 0.2s; }
        .config-table select:focus, .config-table input:focus { outline: none; border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,0.15); }
        .config-table select:disabled { background: #f0f0f0; color: #aaa; cursor: not-allowed; }
        .config-table .col-num { width: 36px; text-align: center; color: #999; font-size: 12px; }
        .config-table .col-type { width: 200px; }
        .config-table .col-subtype { width: 140px; }
        .config-table .col-sku { width: 200px; }
        .config-table .col-desc { min-width: 300px; }
        .config-table .col-qty { width: 70px; }
        .config-table .col-actions { width: 40px; text-align: center; }

        .btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
        .btn-add { background: #e8f0fe; color: #1a73e8; margin-bottom: 20px; }
        .btn-add:hover { background: #d2e3fc; }
        .btn-generate { background: #1a73e8; color: white; width: 100%; padding: 14px; font-size: 16px; justify-content: center; }
        .btn-generate:hover { background: #1557b0; }
        .btn-copy { background: #28a745; color: white; width: 100%; padding: 14px; font-size: 16px; margin-top: 12px; justify-content: center; }
        .btn-copy:hover { background: #218838; }
        .btn-remove { background: none; border: none; color: #dc3545; cursor: pointer; font-size: 18px; padding: 4px 8px; border-radius: 4px; transition: background 0.2s; }
        .btn-remove:hover { background: #fce4ec; }

        /* Результаты */
        .results { background: #f8f9fa; padding: 24px; border-radius: 12px; border-left: 5px solid #1a73e8; margin-top: 20px; display: none; }
        .results h3 { margin-bottom: 12px; color: #333; font-size: 16px; }
        .pn-code { font-family: 'Courier New', monospace; font-size: 22px; font-weight: bold; color: #1a73e8; background: white; padding: 14px; border-radius: 8px; text-align: center; margin: 12px 0; border: 1px solid #e0e0e0; user-select: all; }
        .description { background: white; padding: 16px; border-radius: 8px; font-size: 15px; line-height: 1.6; border-left: 4px solid #28a745; user-select: all; }
        .tower-note { background: #fff3cd; padding: 12px 16px; border-radius: 6px; border-left: 4px solid #ffc107; margin-top: 12px; font-size: 13px; display: none; }

        /* Подсказка по парсингу */
        .parse-info { background: #e8f5e9; padding: 12px 16px; border-radius: 8px; margin-top: 12px; font-size: 12px; color: #2e7d32; display: none; }
        .parse-info code { background: rgba(0,0,0,0.06); padding: 1px 5px; border-radius: 3px; font-family: 'Courier New', monospace; }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 16px; }
            .config-table { font-size: 12px; }
            .config-table th, .config-table td { padding: 6px 3px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vekus Server PN Generator <span class="version-badge">v2.0</span></h1>
        <p class="subtitle">Введите конфигурацию сервера — артикул и описание сгенерируются автоматически</p>

        <!-- Таблица комплектующих -->
        <div style="overflow-x: auto;">
            <table class="config-table" id="configTable">
                <thead>
                    <tr>
                        <th class="col-num">#</th>
                        <th class="col-type">Тип</th>
                        <th class="col-subtype">Подтип</th>
                        <th class="col-sku">Артикул</th>
                        <th class="col-desc">Описание</th>
                        <th class="col-qty">Кол-во</th>
                        <th class="col-actions"></th>
                    </tr>
                </thead>
                <tbody id="configBody">
                </tbody>
            </table>
        </div>

        <button class="btn btn-add" onclick="addRow()">+ Добавить комплектующую</button>

        <button class="btn btn-generate" onclick="generateVekusConfig()">СГЕНЕРИРОВАТЬ АРТИКУЛ И ОПИСАНИЕ</button>

        <div class="results" id="results">
            <h3>Результат генерации</h3>
            <div id="pnCode" class="pn-code"></div>
            <div id="description" class="description"></div>
            <div id="towerNote" class="tower-note"></div>
            <div id="parseInfo" class="parse-info"></div>
            <button class="btn btn-copy" onclick="copyResults()">Копировать в буфер</button>
        </div>
    </div>

    <script>
        // =====================================================
        // ТИПЫ КОМПЛЕКТУЮЩИХ
        // =====================================================
        const COMPONENT_TYPES = [
            { value: 'chassis', label: 'Шасси' },
            { value: 'cpu', label: 'Процессор' },
            { value: 'cooler', label: 'Кулер' },
            { value: 'ram', label: 'Память' },
            { value: 'storage', label: 'Накопитель' },
            { value: 'nic', label: 'Сетевой адаптер' },
            { value: 'raid', label: 'Контроллер дисковых массивов' },
            { value: 'gpu', label: 'GPU' },
            { value: 'psu', label: 'Блок питания' },
            { value: 'other', label: 'Прочее' }
        ];

        const STORAGE_SUBTYPES = [
            { value: '', label: '— выберите —' },
            { value: 'sata_hdd', label: 'SATA HDD' },
            { value: 'sas_hdd', label: 'SAS HDD' },
            { value: 'sata_ssd', label: 'SATA SSD' },
            { value: 'sas_ssd', label: 'SAS SSD' },
            { value: 'nvme', label: 'NVMe' },
            { value: 'm2', label: 'M.2' }
        ];

        // =====================================================
        // МАППИНГ ПЛАТФОРМ (по артикулу/описанию шасси)
        // =====================================================
        const PLATFORM_MAP = [
            { patterns: ['supermicro', 'sys-'], code: 'VS', name: 'Supermicro' },
            { patterns: ['gigabyte', '6nr', '8nr'], code: 'VG', name: 'Gigabyte' },
            { patterns: ['asus', 'rs720', 'rs520', 'rs700', 'esc'], code: 'VA', name: 'ASUS' },
            { patterns: ['chenbro'], code: 'VC', name: 'Chenbro' },
            { patterns: ['tty', 'advantech'], code: 'VT', name: 'TTY' }
        ];

        // CPU поколения Intel Xeon — проверяются сверху вниз (первое совпадение побеждает)
        // Модели уникальны для каждого поколения, дубли устранены
        const CPU_GEN_MAP = [
            // 6th Gen (Granite Rapids / Sierra Forest) — Xeon 6xxx с суффиксом P/E, 6900/6700 серии
            { patterns: ['6980', '6960', '6952', '6942', '6916', '6780', '6766', '6761', '6758', '6756', '6748', '6746', '6744', '6742', '6738', '6736', '6734', '6731', '6721', '6580', '6558', '6556', '6546', '6536', '6530p', '6386', '6384', '6314'], gen: '6' },
            // 5th Gen (Emerald Rapids) — Gold 65xx/54xx/45xx серии
            { patterns: ['6548', '6542', '6538', '6534', '6530', '6526', '6480', '6458', '6448', '6444', '6438', '6434', '6433', '6430', '6428', '6426', '6421', '6418', '6416', '5520', '5515', '5512', '5511', '4516', '4514', '4510', '4509'], gen: '5' },
            // 4th Gen (Sapphire Rapids) — Gold 64xx/54xx/44xx серии + Xeon w5/w7/w9-34xx
            { patterns: ['6462', '6448y', '6442', '6414', '6403', '5420', '5418', '5416', '5415', '5412', '5411', '5410', '4416', '4410', 'w5-3435', 'w7-3465', 'w7-3455', 'w7-3445', 'w9-3475', 'w9-3495'], gen: '4' },
            // 3rd Gen (Ice Lake / Cooper Lake) — Platinum 83xx, Gold 63xx/53xx/43xx
            { patterns: ['8380', '8368', '8362', '8358', '8352', '8351', '6354', '6348', '6342', '6338', '6336', '6334', '6333', '6330', '6326', '5320', '5318', '5317', '5315', '4314', '4310', '4309'], gen: '3' },
        ];

        // =====================================================
        // УПРАВЛЕНИЕ СТРОКАМИ ТАБЛИЦЫ
        // =====================================================
        let rowCounter = 0;

        function addRow(defaults) {
            defaults = defaults || {};
            rowCounter++;
            const tbody = document.getElementById('configBody');
            const tr = document.createElement('tr');
            tr.id = `row-${rowCounter}`;
            tr.dataset.rowId = rowCounter;

            // Тип
            let typeOptions = COMPONENT_TYPES.map(t =>
                `<option value="${t.value}" ${defaults.type === t.value ? 'selected' : ''}>${t.label}</option>`
            ).join('');

            // Подтип накопителя
            let subtypeOptions = STORAGE_SUBTYPES.map(s =>
                `<option value="${s.value}" ${defaults.subtype === s.value ? 'selected' : ''}>${s.label}</option>`
            ).join('');

            const isStorage = defaults.type === 'storage';

            tr.innerHTML = `
                <td class="col-num">${rowCounter}</td>
                <td class="col-type">
                    <select onchange="onTypeChange(this, ${rowCounter})" data-field="type">
                        <option value="">— выберите —</option>
                        ${typeOptions}
                    </select>
                </td>
                <td class="col-subtype">
                    <select data-field="subtype" ${isStorage ? '' : 'disabled'}>
                        ${subtypeOptions}
                    </select>
                </td>
                <td class="col-sku">
                    <input type="text" data-field="sku" placeholder="Артикул комплектующей" value="${defaults.sku || ''}">
                </td>
                <td class="col-desc">
                    <input type="text" data-field="desc" placeholder="Описание комплектующей" value="${defaults.desc || ''}">
                </td>
                <td class="col-qty">
                    <input type="number" data-field="qty" min="1" value="${defaults.qty || 1}" style="text-align:center;">
                </td>
                <td class="col-actions">
                    <button class="btn-remove" onclick="removeRow(${rowCounter})" title="Удалить">&times;</button>
                </td>
            `;

            tbody.appendChild(tr);
            renumberRows();
        }

        function removeRow(id) {
            const row = document.getElementById(`row-${id}`);
            if (row) row.remove();
            renumberRows();
        }

        function renumberRows() {
            const rows = document.querySelectorAll('#configBody tr');
            rows.forEach((row, i) => {
                row.querySelector('.col-num').textContent = i + 1;
            });
        }

        function onTypeChange(select, rowId) {
            const row = document.getElementById(`row-${rowId}`);
            const subtypeSelect = row.querySelector('[data-field="subtype"]');
            if (select.value === 'storage') {
                subtypeSelect.disabled = false;
            } else {
                subtypeSelect.disabled = true;
                subtypeSelect.value = '';
            }
        }

        // =====================================================
        // ЧТЕНИЕ КОНФИГУРАЦИИ ИЗ ТАБЛИЦЫ
        // =====================================================
        function readConfiguration() {
            const rows = document.querySelectorAll('#configBody tr');
            const components = [];
            rows.forEach(row => {
                const type = row.querySelector('[data-field="type"]').value;
                const subtype = row.querySelector('[data-field="subtype"]').value;
                const sku = row.querySelector('[data-field="sku"]').value.trim();
                const desc = row.querySelector('[data-field="desc"]').value.trim();
                const qty = parseInt(row.querySelector('[data-field="qty"]').value) || 1;
                if (type) {
                    components.push({ type, subtype, sku, desc, qty });
                }
            });
            return components;
        }

        // =====================================================
        // ПАРСИНГ КОМПОНЕНТОВ → PN КОДЫ
        // =====================================================

        // Определение платформы по шасси
        function detectPlatform(components) {
            const chassis = components.find(c => c.type === 'chassis');
            if (!chassis) return { code: 'VS', name: 'Unknown' };
            const text = (chassis.sku + ' ' + chassis.desc).toLowerCase();
            for (const p of PLATFORM_MAP) {
                if (p.patterns.some(pat => text.includes(pat))) {
                    return { code: p.code, name: p.name };
                }
            }
            return { code: 'VS', name: 'Unknown' };
        }

        // Определение категории (C/G/S/E)
        function detectCategory(components) {
            const gpus = components.filter(c => c.type === 'gpu');
            if (gpus.length > 0) return 'G';
            const storages = components.filter(c => c.type === 'storage');
            const totalDisks = storages.reduce((s, c) => s + c.qty, 0);
            if (totalDisks >= 8) return 'S';
            return 'C';
        }

        // Определение форм-фактора
        function detectFormfactor(components) {
            const chassis = components.find(c => c.type === 'chassis');
            if (!chassis) return { code: 'R2U', label: '2U', isTower: false };
            const text = (chassis.sku + ' ' + chassis.desc).toLowerCase();

            if (text.includes('tower') || text.includes('twr') || text.includes('twp')) {
                return { code: 'T4U', label: 'Tower 4U', isTower: true };
            }
            if (text.includes('1u') || text.includes('1 u')) {
                return { code: 'R1U', label: '1U', isTower: false };
            }
            if (text.includes('4u') || text.includes('4 u')) {
                return { code: 'R4U', label: 'Rack 4U', isTower: false };
            }
            // По умолчанию 2U
            return { code: 'R2U', label: '2U', isTower: false };
        }

        // Определение CPU кода (I + сокеты + поколение)
        function detectCpuCode(components) {
            const cpus = components.filter(c => c.type === 'cpu');
            if (cpus.length === 0) return { code: 'I24', model: '', specs: '' };

            const cpu = cpus[0];
            const text = (cpu.sku + ' ' + cpu.desc).toLowerCase();
            const qty = cpus.reduce((s, c) => s + c.qty, 0);
            const sockets = qty >= 2 ? '2' : '1';

            // Определяем поколение
            let gen = '4'; // по умолчанию
            for (const g of CPU_GEN_MAP) {
                if (g.patterns.some(pat => text.includes(pat))) {
                    gen = g.gen;
                    break;
                }
            }

            // Извлекаем модель CPU для описания
            const descText = cpu.desc || '';
            let model = descText;
            // Пытаемся извлечь Xeon ... из описания
            const xeonMatch = descText.match(/Xeon\s+\w+\s+[\w-]+/i);
            if (xeonMatch) model = xeonMatch[0];

            // Извлекаем спецификации (GHz/MB/cores/W) из скобок
            let specs = '';
            const specsMatch = descText.match(/\(([^)]+)\)/);
            if (specsMatch) specs = specsMatch[1];

            return { code: `I${sockets}${gen}`, model, specs, qty };
        }

        // Определение дисковых корзин (по шасси)
        function detectDiskBays(components) {
            const chassis = components.find(c => c.type === 'chassis');
            if (!chassis) return { code: 'DM', baysText: '8x 3.5"' };
            const text = (chassis.sku + ' ' + chassis.desc).toLowerCase();

            // Ищем количество bays в описании шасси
            const bayMatch = text.match(/(\d+)\s*x\s*(3\.5|2\.5|lff|sff)/i) ||
                             text.match(/up\s*to\s*(\d+)\s*x/i) ||
                             text.match(/(\d+)\s*(?:bay|slot|hdd|ssd)/i);

            let bays = 8;
            let size = '3.5"';

            if (bayMatch) {
                bays = parseInt(bayMatch[1]);
                if (bayMatch[2]) {
                    size = bayMatch[2].includes('2.5') || bayMatch[2].toLowerCase() === 'sff' ? '2.5"' : '3.5"';
                }
            }

            // Определяем тип дисков из конфигурации
            const storages = components.filter(c => c.type === 'storage');
            const subtypes = new Set(storages.map(s => s.subtype).filter(Boolean));
            const hasNvme = subtypes.has('nvme') || subtypes.has('m2');
            const hasSata = subtypes.has('sata_hdd') || subtypes.has('sata_ssd');
            const hasSas = subtypes.has('sas_hdd') || subtypes.has('sas_ssd');

            let diskTypeCode = 'M'; // M = Mixed/Hybrid по умолчанию
            if (hasNvme && !hasSata && !hasSas) diskTypeCode = 'N';
            else if (hasSata && !hasSas && !hasNvme) diskTypeCode = 'S';
            else if (hasSas && !hasSata && !hasNvme) diskTypeCode = 'A';

            // Код: C для 12 bays, D для 4-8, S для 24+
            let bayCode = 'D';
            if (bays >= 24) bayCode = 'S';
            else if (bays >= 12) bayCode = 'C';
            else if (bays <= 4) bayCode = 'D';

            return {
                code: `${bayCode}${diskTypeCode}`,
                baysText: `${bays}x ${size}`,
                bays,
                size
            };
        }

        // Определение уровня RAM
        function detectRamLevel(components) {
            const rams = components.filter(c => c.type === 'ram');
            if (rams.length === 0) return { level: '1', totalGb: 0, text: '' };

            let totalGb = 0;
            let moduleSize = 0;
            let ramType = 'DDR5';

            rams.forEach(r => {
                const text = r.desc || '';
                // Ищем объем модуля
                const gbMatch = text.match(/(\d+)\s*(?:GB|Gb|ГБ)/i);
                if (gbMatch) {
                    moduleSize = parseInt(gbMatch[1]);
                    totalGb += moduleSize * r.qty;
                }
                // DDR тип
                if (text.toLowerCase().includes('ddr4')) ramType = 'DDR4';
                if (text.toLowerCase().includes('ddr5')) ramType = 'DDR5';
            });

            let level = '1';
            if (totalGb >= 1024) level = '4';
            else if (totalGb >= 512) level = '3';
            else if (totalGb >= 192) level = '2';

            const totalRamQty = rams.reduce((s, r) => s + r.qty, 0);
            return {
                level,
                totalGb,
                text: `${totalRamQty}x${moduleSize}Gb ${ramType} ${totalGb >= 16 ? 'ECC REG' : ''}`.trim(),
                moduleSize,
                ramType,
                qty: totalRamQty
            };
        }

        // Определение типа PSU
        function detectPsu(components) {
            const psus = components.filter(c => c.type === 'psu');
            if (psus.length === 0) {
                // Попробуем найти PSU в описании шасси
                const chassis = components.find(c => c.type === 'chassis');
                if (chassis) {
                    const text = (chassis.desc || '').toLowerCase();
                    if (text.includes('redundant') || text.includes('1+1') || text.includes('2x')) return { code: 'H', text: '' };
                }
                return { code: 'H', text: '' };
            }

            const totalPsu = psus.reduce((s, p) => s + p.qty, 0);
            const psuText = psus[0].desc || '';

            // Извлекаем мощность
            const wattMatch = psuText.match(/(\d+)\s*W/i);
            const watts = wattMatch ? wattMatch[1] : '';

            if (totalPsu >= 4) return { code: 'D4', text: `${totalPsu}x${watts}W`, watts };
            if (totalPsu >= 2) {
                const isHotswap = psuText.toLowerCase().includes('hot') || psuText.toLowerCase().includes('redundant') || psuText.toLowerCase().includes('1+1');
                return { code: isHotswap ? 'H' : 'D2', text: `${totalPsu}x${watts}W`, watts };
            }
            return { code: 'F', text: `${watts}W`, watts };
        }

        // Определение GPU для описания
        function detectGpu(components) {
            const gpus = components.filter(c => c.type === 'gpu');
            if (gpus.length === 0) return null;

            const gpu = gpus[0];
            const desc = gpu.desc || '';
            const qty = gpus.reduce((s, g) => s + g.qty, 0);

            // Извлекаем модель и память
            let model = desc;
            const gpuMatch = desc.match(/(RTX\s*\d+\w*|A\d+|H\d+|L\d+|T\d+|V\d+|Quadro\s+\w+|Tesla\s+\w+)/i);
            if (gpuMatch) model = gpuMatch[1];

            const memMatch = desc.match(/(\d+)\s*(?:GB|Gb|ГБ)/i);
            const mem = memMatch ? memMatch[1] + 'Gb' : '';

            return {
                text: `${qty > 1 ? qty + 'x' : ''}${model}${mem ? ' ' + mem : ''}`,
                qty
            };
        }

        // Определение RAID контроллера
        function detectRaid(components) {
            const raids = components.filter(c => c.type === 'raid');
            if (raids.length === 0) return null;

            const raid = raids[0];
            const desc = raid.desc || raid.sku || '';

            // Ищем модель RAID — полный номер (9560-16i, 9341-4i, PERC H755 итд)
            let model = '';
            // MegaRAID/SmartRAID + номер
            const megaMatch = desc.match(/(?:MegaRAID|SmartRAID)\s*(\d{4}[\w-]*)/i);
            if (megaMatch) {
                model = megaMatch[1];
            } else {
                // PERC H755, RAID 9341-4i итд
                const raidNumMatch = desc.match(/(\d{4}[\w-]+)/i);
                const percMatch = desc.match(/(PERC\s*\w+[\w-]*)/i);
                if (percMatch) model = percMatch[1];
                else if (raidNumMatch) model = raidNumMatch[1];
                else model = desc.split(/[,;]/)[0].trim();
            }

            model = 'RAID ' + model;

            // Ищем BBU/CacheVault
            const hasBbu = desc.toLowerCase().includes('bbu') || desc.toLowerCase().includes('cachevault') || desc.toLowerCase().includes('btr');

            return {
                text: model + (hasBbu ? '/BBU' : ''),
            };
        }

        // Определение сетевых адаптеров
        function detectNetwork(components) {
            const nics = components.filter(c => c.type === 'nic');
            if (nics.length === 0) return { lom: '', additional: '' };

            const parts = [];
            nics.forEach(nic => {
                const desc = nic.desc || '';
                const qty = nic.qty;

                // Ищем скорость и тип порта
                const speedMatch = desc.match(/(\d+)\s*(?:GbE?|Gb\/s)/i);
                const portMatch = desc.match(/(SFP28|SFP\+|RJ45|QSFP|SFP)/i);
                const countMatch = desc.match(/(\d+)\s*(?:x|port)/i);

                let portCount = countMatch ? parseInt(countMatch[1]) : 1;
                let speed = speedMatch ? speedMatch[1] : '10';
                let portType = portMatch ? portMatch[1] : 'GbE';

                if (portType === 'RJ45') portType = 'GbE';

                parts.push(`${portCount > 1 ? portCount + 'x' : ''}${speed}Gb ${portType !== 'GbE' ? portType + ' ' : 'GbE '}NIC`);
            });

            return { text: parts.join('/') };
        }

        // Определение LOM из описания шасси
        function detectLom(components) {
            const chassis = components.find(c => c.type === 'chassis');
            if (!chassis) return '';
            const text = (chassis.desc || '').toLowerCase();

            if (text.includes('10gbe') || text.includes('10gb') || text.includes('x550')) return '2x10GbE LOM';
            if (text.includes('1gbe') || text.includes('1gb') || text.includes('i350')) return '2x1GbE LOM';
            if (text.includes('25gbe') || text.includes('25gb')) return '2x25GbE LOM';
            return '2x1GbE LOM'; // по умолчанию
        }

        // Определение ПО
        function detectSoftware(components) {
            const others = components.filter(c => c.type === 'other');
            const sw = [];
            others.forEach(o => {
                const text = (o.desc || '').toLowerCase();
                if (text.includes('astra') || text.includes('linux')) sw.push('Astra Linux');
                else if (text.includes('kaspersky') || text.includes('каспер')) sw.push('Kaspersky');
                else if (text.includes('win') && text.includes('pro')) sw.push('Win11 Pro');
                else if (text.includes('win') && text.includes('server')) sw.push('Win Server');
                else if (text.includes('monitor') || text.includes('монитор')) sw.push(o.desc);
                else sw.push(o.desc);
            });
            return sw;
        }

        // Накопители для описания
        function detectStorageText(components) {
            const storages = components.filter(c => c.type === 'storage');
            if (storages.length === 0) return '';

            const parts = [];
            storages.forEach(s => {
                const desc = s.desc || '';
                const qty = s.qty;

                // Извлекаем объем
                const sizeMatch = desc.match(/(\d+)\s*(TB|Tb|ТБ|GB|Gb|ГБ)/i);
                let sizeText = sizeMatch ? sizeMatch[1] + sizeMatch[2].replace(/тб/i, 'Tb').replace(/гб/i, 'Gb').replace(/TB/i, 'Tb').replace(/GB/i, 'Gb') : '';

                // Тип
                let typeText = '';
                switch (s.subtype) {
                    case 'sata_hdd': typeText = 'SATA HDD'; break;
                    case 'sas_hdd': typeText = 'SAS HDD'; break;
                    case 'sata_ssd': typeText = 'SATA SSD'; break;
                    case 'sas_ssd': typeText = 'SAS SSD'; break;
                    case 'nvme': typeText = 'NVMe'; break;
                    case 'm2': typeText = 'SSD M.2'; break;
                    default: typeText = 'HDD';
                }

                parts.push(`${qty > 1 ? qty + 'x' : ''}${sizeText} ${typeText}`);
            });

            return parts.join('/');
        }

        // =====================================================
        // ГЕНЕРАЦИЯ АРТИКУЛА И ОПИСАНИЯ
        // =====================================================
        function generateVekusConfig() {
            const components = readConfiguration();
            if (components.length === 0) {
                alert('Добавьте хотя бы одну комплектующую');
                return;
            }

            // Парсим все компоненты
            const platform = detectPlatform(components);
            const category = detectCategory(components);
            const ff = detectFormfactor(components);
            const cpuCode = detectCpuCode(components);
            const diskBays = detectDiskBays(components);
            const ramInfo = detectRamLevel(components);
            const psuInfo = detectPsu(components);
            const gpuInfo = detectGpu(components);
            const raidInfo = detectRaid(components);
            const networkInfo = detectNetwork(components);
            const lomInfo = detectLom(components);
            const storageText = detectStorageText(components);
            const softwareList = detectSoftware(components);

            // Дата
            const now = new Date();
            const dateCode = `${now.getMonth() + 1}${now.getDate() < 10 ? '0' + now.getDate() : now.getDate()}`;

            // === АРТИКУЛ ===
            const pn = `${platform.code}${category}.${ff.code}.${cpuCode.code}.${diskBays.code}.${ramInfo.level}.${psuInfo.code}/${dateCode}`;

            // === ОПИСАНИЕ ===
            const isTower = ff.isTower;
            const formLabel = isTower ? `TWR` : ff.label;

            let descParts = [];
            // Начало
            descParts.push(`${isTower ? 'ПЭВМ' : 'Сервер'} Vekus "Кварк" ${formLabel} ${diskBays.baysText} в составе:`);

            // CPU
            const cpuQty = cpuCode.qty || 2;
            let cpuText = cpuCode.model;
            if (cpuCode.specs) cpuText += ` (${cpuCode.specs})`;
            descParts.push(`${cpuQty > 1 ? cpuQty + 'x' : ''}${cpuText}`);

            // RAM
            if (ramInfo.text) descParts.push(ramInfo.text);

            // Storage
            if (storageText) descParts.push(storageText);

            // RAID
            if (raidInfo) descParts.push(raidInfo.text);

            // GPU
            if (gpuInfo) descParts.push(gpuInfo.text);

            // LOM + NIC
            if (lomInfo) descParts.push(lomInfo);
            if (networkInfo.text) descParts.push(networkInfo.text);

            // IPMI
            descParts.push('IPMI');

            // Software
            softwareList.forEach(sw => descParts.push(sw));

            // PSU
            if (psuInfo.text) descParts.push(psuInfo.text);

            // Rails (не для Tower)
            if (!isTower) descParts.push('Rails');

            // Собираем описание
            const description = descParts[0] + ' ' + descParts.slice(1).join('/');

            // === ПОКАЗАТЬ РЕЗУЛЬТАТЫ ===
            document.getElementById('pnCode').textContent = pn;
            document.getElementById('description').textContent = description;

            // Tower предупреждение
            const towerNote = document.getElementById('towerNote');
            if (isTower) {
                towerNote.textContent = 'Tower сервер — рельсы (Rail Kit) заказываются отдельно';
                towerNote.style.display = 'block';
            } else {
                towerNote.style.display = 'none';
            }

            // Инфо о парсинге
            const parseInfo = document.getElementById('parseInfo');
            parseInfo.innerHTML = `
                <strong>Разбор:</strong>
                <code>${platform.code}</code> ${platform.name} |
                <code>${category}</code> ${category === 'G' ? 'GPU' : category === 'S' ? 'Storage' : 'Compute'} |
                <code>${ff.code}</code> ${ff.label} |
                <code>${cpuCode.code}</code> CPU |
                <code>${diskBays.code}</code> Диски ${diskBays.baysText} |
                <code>${ramInfo.level}</code> RAM ${ramInfo.totalGb}GB |
                <code>${psuInfo.code}</code> PSU
            `;
            parseInfo.style.display = 'block';

            document.getElementById('results').style.display = 'block';
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
        }

        // =====================================================
        // КОПИРОВАНИЕ
        // =====================================================
        function copyResults() {
            const pnCode = document.getElementById('pnCode').textContent;
            const description = document.getElementById('description').textContent;
            const text = `Артикул: ${pnCode}\n\n${description}`;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.btn-copy');
                const origText = btn.textContent;
                btn.textContent = 'Скопировано';
                btn.style.background = '#1a73e8';
                setTimeout(() => { btn.textContent = origText; btn.style.background = '#28a745'; }, 1500);
            });
        }

        // =====================================================
        // ИНИЦИАЛИЗАЦИЯ — пустая строка по умолчанию
        // =====================================================
        addRow();
    </script>
</body>
</html>
